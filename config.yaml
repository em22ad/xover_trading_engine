#    min_mean: 0.0
#    min_win_rate: 0.50
#    min_sharpe: -0.001
#    min_sortino: -0.001
#    min_stability: -0.001
#    min_max_dd: -0.50
min_rule_quality_score_by_sector:
  INDUSTRIALS_ELEC: 0.27
  BASE_METALS: 0.27
  REMAINING: 0.27